apiVersion: infra.k8smgmt.io/v3
kind: Cluster
metadata:
  labels:
    cluster: c1
  name: akshay-pre-mks1
  project: akshay
spec:
  blueprint:
    name: minimal
  config:
    autoApproveNodes: true
    installerTtl: 365
    kubernetesVersion: v1.34.3
    network:
      cni:
        name: Calico
        version: 3.31.4
      podSubnet: 10.244.0.0/16
      serviceSubnet: 10.96.0.0/12
    nodes:
    - arch: amd64
      hostname: akshay-pre-mks1
      operatingSystem: Ubuntu22.04
      privateIP: 10.0.0.104
      roles:
      - Worker
      - ControlPlane
    platformVersion: v1.2.0
  proxy: {}
  type: mks
