apiVersion: infra.k8smgmt.io/v3
kind: Cluster
metadata:
  name: akshay-tb-c
  project: defaultproject
spec:
  blueprintConfig:
    name: minimal
    version: Latest
  cloudCredentials: akshay-aws
  config:
    accessConfig:
      authenticationMode: CONFIG_MAP
    addons:
    - name: coredns
      version: v1.12.3-eksbuild.1
    - name: vpc-cni
      version: v1.20.4-eksbuild.2
    - name: kube-proxy
      version: v1.34.0-eksbuild.2
    addonsConfig: {}
    autoModeConfig: {}
    autoZonalShiftConfig: {}
    managedNodeGroups:
