      desiredCapacity: 2
      iam:
        withAddonPolicies:
          autoScaler: true
      instanceTypes:
      - m5.xlarge
      maxSize: 2
      minSize: 2
      name: ng-0ac7f32c
      version: "1.34"
      volumeSize: 80
      volumeType: gp3
    metadata:
      name: akshay-tb-c
      region: us-west-2
      version: "1.34"
    network:
      cni:
        name: aws-cni
    vpc:
      cidr: 192.168.0.0/16
      clusterEndpoints:
        privateAccess: true
        publicAccess: false
      nat:
        gateway: Single
    zonalShiftConfig: {}
  proxyConfig: {}
  type: aws-eks
