apiVersion: infra.k8smgmt.io/v3
kind: Cluster
metadata:
  name: agent-test-qc
  project: akshay-2
spec:
  blueprint:
    name: minimal
  config:
    autoApproveNodes: true
    installerTtl: 365
    kubernetesVersion: v1.34.3
    network:
      cni:
        name: Calico
        version: 3.31.4
      podSubnet: 10.244.0.0/16
      serviceSubnet: 10.96.0.0/12
    nodes:
    - arch: amd64
      hostname: akshay-amd-qc
      operatingSystem: Ubuntu22.04
      privateIP: 10.0.0.18
      roles:
      - Worker
      - ControlPlane
    platformVersion: v1.2.0
  proxy: {}
  type: mks
