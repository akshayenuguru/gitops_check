apiVersion: infra.k8smgmt.io/v3
kind: Cluster
metadata:
  labels:
    cluster: c1
  name: akshay-amd-qc
  project: akshay-2
spec:
  blueprint:
    name: default-upstream
    version: latest
  config:
    autoApproveNodes: true
    installerTtl: 365
    kubernetesVersion: v1.34.3
    network:
      cni:
        name: Calico
        version: 3.31.4
      podSubnet: 10.244.0.0/16
      serviceSubnet: 10.96.0.0/12
    nodes:
    - arch: amd64
      hostname: akshay-qc-amd
      operatingSystem: Ubuntu22.04
      privateIP: 10.0.0.34
      roles:
      - ControlPlane
      - Worker
    platformVersion: v1.2.0
  proxy: {}
  sharing:
    enabled: true
    projects:
    - name: mora-learning-pej
  type: mks
