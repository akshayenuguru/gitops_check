apiVersion: eaas.envmgmt.io/v1
kind: WorkflowHandler
metadata:
  name: vr-wfh1
  project: akshay-2
spec:
  config:
    function:
      image: registry.dev.rafay-edge.net/dev/python-func:20260324111446-4859
      kubeOptions:
        securityContext:
          readOnlyRootFileSystem: true
      language: python
      skipBuild: true
      source: "from logging import Logger\nfrom typing import Dict, Any\nimport time\n\ndef
        handler(logger: Logger, request: Dict[str, Any]) -> Dict[str, Any]:\n    logger.info(f\"received
        request, req: {request}\")\n    print(\"Hello buddy - starting sleep\")\n\n
        \   time.sleep(200)  \n\n    print(\"Completed execution\")\n    return {\n
        \       \"status\": \"success\",\n        \"message\": \"Hello buddy after
        sleep\"\n    }"
      targetPlatforms:
      - linux/amd64
    type: function
