apiVersion: infra.k8smgmt.io/v3
kind: Cluster
metadata:
  name: kaveri-mks1-upgrade
  project: defaultproject
spec:
  blueprint:
    name: minimal
  config:
    autoApproveNodes: true
    installerTtl: 365
    kubernetesVersion: v1.33.5
    network:
      cni:
        name: Calico
        version: 3.28.1
      podSubnet: 10.244.0.0/16
      serviceSubnet: 10.96.0.0/12
    nodes:
    - arch: amd64
      hostname: kaveri-123-kafka
      operatingSystem: Ubuntu24.04
      privateIP: 192.168.2.237
      roles:
      - Worker
      - ControlPlane
    platformVersion: v1.1.0
  proxy: {}
  type: mks
