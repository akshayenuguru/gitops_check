apiVersion: infra.k8smgmt.io/v3
kind: Cluster
metadata:
  labels:
    cluster: c2
  name: akshay-amd-prod-2
  project: akshay-2
spec:
  blueprint:
    name: default
    version: latest
  config:
    autoApproveNodes: true
    installerTtl: 365
    kubernetesVersion: v1.34.3
    network:
      cni:
        name: Calico
        version: 3.31.4
      podSubnet: 10.244.0.0/16
      serviceSubnet: 10.96.0.0/12
    nodes:
    - arch: amd64
      hostname: akshay-amd-pord-2
      operatingSystem: Ubuntu22.04
      privateIP: 10.0.0.184
      roles:
      - Worker
      - ControlPlane
    platformVersion: v1.2.0
  proxy: {}
  type: mks
