apiVersion: infra.k8smgmt.io/v3
kind: Blueprint
metadata:
  name: akshay-bp
  project: akshay
spec:
  base:
    name: default
    version: 4.0.0
  customAddons:
  - name: addon2
    version: v3
  defaultAddons:
    enableIngress: true
    enableMonitoring: true
    monitoring:
      gpuOperator: {}
  driftWebhook:
    enabled: true
  type: custom
  version: v4
  versionState: active
